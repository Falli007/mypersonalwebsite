<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bgHealth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12181f"/>
      <stop offset="100%" stop-color="#1a2430"/>
    </linearGradient>
    <radialGradient id="glowHealth" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bgHealth)"/>
  <rect width="400" height="220" fill="url(#glowHealth)"/>
  <!-- pulse line -->
  <polyline points="50,120 110,120 130,80 150,160 170,60 190,140 210,120 350,120"
            fill="none" stroke="#4fd1c5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- medical cross -->
  <g transform="translate(300,70)">
    <rect x="-6" y="-22" width="12" height="44" rx="3" fill="#f87171" opacity="0.85"/>
    <rect x="-22" y="-6" width="44" height="12" rx="3" fill="#f87171" opacity="0.85"/>
  </g>
</svg>
