<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bgForecast" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12181f"/>
      <stop offset="100%" stop-color="#1a2430"/>
    </linearGradient>
    <linearGradient id="bandForecast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4fd1c5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bgForecast)"/>
  <!-- axes -->
  <line x1="40" y1="180" x2="370" y2="180" stroke="#232b36" stroke-width="1"/>
  <line x1="40" y1="30" x2="40" y2="180" stroke="#232b36" stroke-width="1"/>
  <!-- actuals -->
  <polyline points="40,150 80,140 120,155 160,120 200,130"
            fill="none" stroke="#9aa8b8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- confidence band -->
  <path d="M200,130 L240,95 L280,80 L320,60 L360,50 L360,110 L320,120 L280,130 L240,145 L200,150 Z"
        fill="url(#bandForecast)"/>
  <!-- forecast -->
  <polyline points="200,130 240,110 280,95 320,78 360,65"
            fill="none" stroke="#4fd1c5" stroke-width="2.5" stroke-dasharray="6 5" stroke-linejoin="round"/>
  <circle cx="200" cy="130" r="4" fill="#e6edf3"/>
</svg>
